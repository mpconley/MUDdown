# MUDdown nginx configuration
# Static website + WebSocket/API proxy to game server
#
# IMPORTANT: This is the HTTP-only base config. After running certbot, it adds
# an HTTPS server block with SSL directives to the live copy in
# /etc/nginx/sites-available/. DO NOT overwrite the live file with this one
# after certbot has run — you will lose the SSL config and take the site down.
# Instead, apply changes manually or re-run certbot after copying.
#
# Initial setup:
#   1. Copy to /etc/nginx/sites-available/muddown.conf
#   2. Copy snippets: cp deploy/nginx/muddown-proxy.conf /etc/nginx/snippets/
#      cp deploy/nginx/security-headers.conf /etc/nginx/snippets/muddown-security-headers.conf
#   3. ln -s /etc/nginx/sites-available/muddown.conf /etc/nginx/sites-enabled/
#   4. Remove default: rm /etc/nginx/sites-enabled/default
#   5. nginx -t && systemctl reload nginx
#
# TLS: After DNS is pointed, run:
#   certbot --nginx -d muddown.com -d www.muddown.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;

# Upstream game server
upstream muddown_server {
    server 127.0.0.1:3300;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name muddown.com www.muddown.com;

    # --- Security headers (shared snippet) ---
    include snippets/muddown-security-headers.conf;

    # --- Static website (Astro build output) ---
    root /opt/muddown/apps/website/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        include snippets/muddown-security-headers.conf;
    }

    # --- API proxy (games, etc.) ---
    location /api/ {
        limit_req zone=auth burst=20 nodelay;
        include snippets/muddown-proxy.conf;
    }

    # --- Auth proxy ---
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        include snippets/muddown-proxy.conf;
    }

    # --- Health check proxy ---
    location = /health {
        include snippets/muddown-proxy.conf;
    }

    # --- WebSocket proxy ---
    location /ws {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass http://muddown_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Block dotfiles ---
    location ~ /\. {
        deny all;
        return 404;
    }

    # --- Error pages ---
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
