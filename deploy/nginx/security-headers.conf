# MUDdown security headers
# Included via: include snippets/muddown-security-headers.conf;
#
# Technical debt: script-src and style-src use 'unsafe-inline' because Astro
# emits inline <script> and <style> blocks in the static HTML build output.
# nginx serves these as plain files with no server-side rendering, so there is
# no request-time hook to inject CSP nonces. To remove 'unsafe-inline':
#   1. Move all inline scripts to external .js files (4 pages: play, games,
#      login, Base layout).
#   2. Astro scoped styles would need to use external CSS or build-time hashes.
#   3. Compute SHA-256 hashes for any remaining inline blocks and add them to
#      the CSP (e.g., script-src 'self' 'sha256-<hash>'), updating hashes on
#      every content change.
# Until then, 'unsafe-inline' is the pragmatic choice for a static-file server.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' wss://muddown.com wss://www.muddown.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-src https://discord.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
