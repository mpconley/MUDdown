name: Desktop Build

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/client/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/client/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: echo "version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: appimage-deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: msi

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build workspace deps
        run: npx turbo run build --filter=@muddown/client... --filter=@muddown/shared...

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple notarization (macOS only)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          # On push to main, create/update a GitHub Release and upload artifacts + latest.json
          tagName: ${{ github.ref == 'refs/heads/main' && format('desktop-v{0}', needs.get-version.outputs.version) || '' }}
          releaseName: ${{ github.ref == 'refs/heads/main' && format('MUDdown Desktop v{0}', needs.get-version.outputs.version) || '' }}
          releaseBody: ${{ github.ref == 'refs/heads/main' && 'See the assets below to download the desktop app for your platform.' || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Install minisign (signature verification test)
        if: matrix.platform != 'windows-latest'
        run: |
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            curl -sSL -o minisign.tar.gz \
              "https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz"
            echo "9a599b48ba6eb7b1e80f12f36b94ceca7c00b7a5173c95c3efc88d9822957e73  minisign.tar.gz" | sha256sum -c -
            tar xzf minisign.tar.gz
            sudo install -m 755 minisign-linux/x86_64/minisign /usr/local/bin/minisign
          else
            brew install minisign
          fi

      - name: Verify update signatures
        if: matrix.platform != 'windows-latest'
        run: |
          export TAURI_PUBKEY=$(jq -r '.plugins.updater.pubkey' apps/desktop/src-tauri/tauri.conf.json)
          bash apps/desktop/tests/verify-signature.sh ${{ matrix.target }}

      - name: Verify notarization (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "APPLE_ID not configured — skipping notarization check"
            exit 0
          fi
          DMG=$(find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.dmg" -print -quit)
          if [ -n "$DMG" ]; then
            echo "Verifying notarization staple on $DMG"
            xcrun stapler validate "$DMG"
          else
            echo "No .dmg found — skipping notarization check"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: warn
